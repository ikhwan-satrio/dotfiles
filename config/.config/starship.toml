format = """
┌────[](#2d2d2d)$shell$os$username\
$git_branch$git_status\
$golang\
$nodejs\
$python\
$bun\
$rust\
$java\
$php\
$c\
$cpp\
$lua\
$swift\
$zig\
$julia\
$perl\
$package\
$docker_context[](#2d2d2d)
│─  $directory
└─$character"""
add_newline = true

# ============================================================================
# TINGKAT 1 - [VIA] FORMAT PER MODULE (Catppuccin Mocha)
# ============================================================================

# Shell
[shell]
fish_indicator = 'fish'
zsh_indicator = 'zsh'
powershell_indicator = 'powershell'
bash_indicator = 'bash'
unknown_indicator = '?'
format = '[ /bin/$indicator ]($style)'
style = 'bg:#2d2d2d fg:#cdd6f4 bold'
disabled = false

# OS
[os]
disabled = false
format = '[ $name $symbol ]($style)'
style = 'bg:#2d2d2d fg:#f5e0dc bold'
[os.symbols]
Alpaquita = "🔔"
Alpine = "🏔️"
Amazon = "🙂"
Android = "🤖"
Arch = "🎗️"
Artix = "🎗️"
CentOS = "💠"
Debian = "🌀"
DragonFly = "🐉"
Emscripten = "🔗"
EndeavourOS = "🚀"
Fedora = "🎩"
FreeBSD = "😈"
Garuda = "🦅"
Gentoo = "🗜️"
HardenedBSD = "🛡️"
Illumos = "🐦"
Linux = "🐧"
Mabox = "📦"
Macos = "🍎"
Manjaro = "🥭"
Mariner = "🌊"
MidnightBSD = "🌘"
Mint = "🌿"
NetBSD = "🚩"
NixOS = "❄️"
OpenBSD = "🐡"
OpenCloudOS = "☁️"
openEuler = "🦉"
openSUSE = "🦎"
OracleLinux = "🦴"
Pop = "🍭"
Raspbian = "🍓"
Redhat = "🎩"
RedHatEnterprise = "🎩"
Redox = "🧪"
Solus = "⛵"
SUSE = "🦎"
Ubuntu = "🎯"
Unknown = "❓"
Windows = "🪟"

# Username
[username]
style_user = 'bg:#2d2d2d fg:#89dceb bold'
style_root = 'bg:#2d2d2d fg:#f38ba8 bold'
format = '[ $user ]($style)'
disabled = false
show_always = true

# Git Branch
[git_branch]
format = '[ $symbol$branch ]($style)'
symbol = '🌱 '
style = 'bg:#2d2d2d fg:#cba6f7 bold'

# Git Status
[git_status]
format = '[ $all_status ]($style)'
style = 'bg:#2d2d2d fg:#f38ba8 bold'

# SEMUA LANGUAGE → FORMAT [VIA] KONSISTEN (Catppuccin Mocha)

[golang]
symbol = '🐹 '
format = '[via $symbol$version]($style)'
style = 'bg:#2d2d2d fg:#89dceb bold'

[nodejs]
symbol = '⬢ '
format = '[via $symbol$version]($style)'
style = 'bg:#2d2d2d fg:#a6e3a1 bold'

[python]
symbol = '🐍 '
format = '[via $symbol$version]($style)'
style = 'bg:#2d2d2d fg:#f9e2af bold'

[bun]
symbol = '🥟 '
format = '[via $symbol$version]($style)'
style = 'bg:#2d2d2d fg:#f5e0dc bold'

[rust]
symbol = '🦀 '
format = '[via $symbol$version]($style)'
style = 'bg:#2d2d2d fg:#fab387 bold'

[java]
symbol = '☕ '
format = '[via $symbol$version]($style)'
style = 'bg:#2d2d2d fg:#eba0ac bold'

[php]
symbol = '🐘 '
format = '[via $symbol$version]($style)'
style = 'bg:#2d2d2d fg:#cba6f7 bold'

[c]
symbol = ' '
format = '[via $symbol$version]($style)'
style = 'bg:#2d2d2d fg:#fab387 bold'

[cpp]
symbol = ' '
format = '[via $symbol$version]($style)'
style = 'bg:#2d2d2d fg:#f38ba8 bold'

[lua]
symbol = '🌙 '
format = '[via $symbol$version]($style)'
style = 'bg:#2d2d2d fg:#89b4fa bold'

[swift]
symbol = '🐦 '
format = '[via $symbol$version]($style)'
style = 'bg:#2d2d2d fg:#fab387 bold'

[zig]
symbol = '↯ '
format = '[via $symbol$version]($style)'
style = 'bg:#2d2d2d fg:#f9e2af bold'

[julia]
symbol = 'ஃ '
format = '[via $symbol$version]($style)'
style = 'bg:#2d2d2d fg:#cba6f7 bold'

[perl]
symbol = '🦪 '
format = '[via $symbol$version]($style)'
style = 'bg:#2d2d2d fg:#89dceb bold'

[package]
symbol = '📦 '
format = '[ $symbol$version ]($style)'
style = 'bg:#2d2d2d fg:#fab387 bold'
disabled = false

[docker_context]
symbol = '🐳 '
format = '[ $symbol$context ]($style)'
style = 'bg:#2d2d2d fg:#89b4fa bold'

# Tingkat 2 & 3
[directory]
format = '[$path]($style)[$read_only]($read_only_style)'
style = 'bold #f9e2af'
truncation_length = 3
truncate_to_repo = false

[character]
success_symbol = ' [](bold #a6e3a1) [](bold #f9e2af) [](bold #a6e3a1)'
error_symbol = ' [✗](bold #f38ba8)'
