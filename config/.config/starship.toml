
format = """
┌────[](#2d2d2d)$shell$os$username\
$git_branch$git_status\
$golang\
$nodejs\
$python\
$bun\
$rust\
$java\
$php\
$c\
$cpp\
$lua\
$swift\
$zig\
$julia\
$perl\
$package\
$docker_context[](#2d2d2d)
│─  $directory
└─$character"""

add_newline = true

# ============================================================================
# TINGKAT 1 - [VIA] FORMAT PER MODULE
# ============================================================================

# Shell
[shell]
fish_indicator = 'fish'
zsh_indicator = 'zsh'
powershell_indicator = 'powershell'
bash_indicator = 'bash'
unknown_indicator = '?'
format = '[ /bin/$indicator ]($style)'
style = 'bg:#2d2d2d fg:#cccccc bold'
disabled = false

# OS
[os]
disabled = false
format = '[ $name $symbol ]($style)'
style = 'bg:#2d2d2d fg:#ffffff bold'

[os.symbols]
Alpaquita = "🔔"
Alpine = "🏔️"
Amazon = "🙂"
Android = "🤖"
Arch = "🎗️"
Artix = "🎗️"
CentOS = "💠"
Debian = "🌀"
DragonFly = "🐉"
Emscripten = "🔗"
EndeavourOS = "🚀"
Fedora = "🎩"
FreeBSD = "😈"
Garuda = "🦅"
Gentoo = "🗜️"
HardenedBSD = "🛡️"
Illumos = "🐦"
Linux = "🐧"
Mabox = "📦"
Macos = "🍎"
Manjaro = "🥭"
Mariner = "🌊"
MidnightBSD = "🌘"
Mint = "🌿"
NetBSD = "🚩"
NixOS = "❄️"
OpenBSD = "🐡"
OpenCloudOS = "☁️"
openEuler = "🦉"
openSUSE = "🦎"
OracleLinux = "🦴"
Pop = "🍭"
Raspbian = "🍓"
Redhat = "🎩"
RedHatEnterprise = "🎩"
Redox = "🧪"
Solus = "⛵"
SUSE = "🦎"
Ubuntu = "🎯"
Unknown = "❓"
Windows = "🪟"

# Username
[username]
style_user = 'bg:#2d2d2d fg:#00ffff bold'
style_root = 'bg:#2d2d2d fg:#ff0000 bold'
format = '[ $user ]($style)'
disabled = false
show_always = true

# Git Branch
[git_branch]
format = '[ $symbol$branch ]($style)'
symbol = '🌱 '
style = 'bg:#2d2d2d fg:#ff00ff bold'

# Git Status (FIXED)
[git_status]
format = '[ $all_status ]($style)'
style = 'bg:#2d2d2d fg:#ff0000 bold'

# SEMUA LANGUAGE → FORMAT [VIA] KONSISTEN
[golang]
symbol = '🐹 '
format = '[via $symbol$version]($style)'
style = 'bg:#2d2d2d fg:#00ffff bold'

[nodejs]
symbol = '⬢ '
format = '[via $symbol$version]($style)'
style = 'bg:#2d2d2d fg:#00ff00 bold'

[python]
symbol = '🐍 '
format = '[via $symbol$version]($style)'
style = 'bg:#2d2d2d fg:#ffff00 bold'

[bun]
symbol = '🥟 '
format = '[via $symbol$version]($style)'
style = 'bg:#2d2d2d fg:#cccccc bold'

[rust]
symbol = '🦀 '
format = '[via $symbol$version]($style)'
style = 'bg:#2d2d2d fg:#ff0000 bold'

[java]
symbol = '☕ '
format = '[via $symbol$version]($style)'
style = 'bg:#2d2d2d fg:#ff4444 bold'

[php]
symbol = '🐘 '
format = '[via $symbol$version]($style)'
style = 'bg:#2d2d2d fg:#ff00ff bold'

[c]
symbol = ' '
format = '[via $symbol$version]($style)'
style = 'bg:#2d2d2d fg:#ff6600 bold'

[cpp]
symbol = ' '
format = '[via $symbol$version]($style)'
style = 'bg:#2d2d2d fg:#ff6600 bold'

[lua]
symbol = '🌙 '
format = '[via $symbol$version]($style)'
style = 'bg:#2d2d2d fg:#00ffff bold'

[swift]
symbol = '🐦 '
format = '[via $symbol$version]($style)'
style = 'bg:#2d2d2d fg:#ffff00 bold'

[zig]
symbol = '↯ '
format = '[via $symbol$version]($style)'
style = 'bg:#2d2d2d fg:#ffff00 bold'

[julia]
symbol = 'ஃ '
format = '[via $symbol$version]($style)'
style = 'bg:#2d2d2d fg:#ff00ff bold'

[perl]
symbol = '🦪 '
format = '[via $symbol$version]($style)'
style = 'bg:#2d2d2d fg:#00ffff bold'

[package]
symbol = '📦 '
format = '[ $symbol$version ]($style)'
style = 'bg:#2d2d2d fg:#ff8800 bold'
disabled = false

[docker_context]
symbol = '🐳 '
format = '[ $symbol$context ]($style)'
style = 'bg:#2d2d2d fg:#00aaff bold'

# Tingkat 2 & 3 sama
[directory]
format = '[$path]($style)[$read_only]($read_only_style)'
style = 'bold yellow'
truncation_length = 3
truncate_to_repo = false

[character]
success_symbol = ' [](bold green) [](bold yellow) [](bold green)'
error_symbol = ' [✗](bold red)'
